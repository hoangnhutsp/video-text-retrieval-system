services:
  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '${WEAVIATE_CONTAINER_PORT:-8080}'
    - --scheme
    - http
    image: semitechnologies/weaviate:1.27.1
    ports:
    - "${WEAVIATE_PORT:-8082}:${WEAVIATE_CONTAINER_PORT:-8080}"
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: 'text2vec-openai,text2vec-cohere,text2vec-huggingface,ref2vec-centroid,generative-openai,qna-openai'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
    - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEAVIATE_CONTAINER_PORT:-8080}/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vector_net

  video-retrieval-api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_PORT:-5001}:${API_CONTAINER_PORT:-5000}"
    environment:
      - PORT=${API_CONTAINER_PORT:-5000}
      - VECTOR_DB_URL=http://weaviate:${WEAVIATE_CONTAINER_PORT:-8080}
      - DATASET_PATH=/app/dataset
    volumes:
      - ./dataset:/app/dataset:ro
      - ./video_retrieval_index:/app/video_retrieval_index
    depends_on:
      - weaviate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_CONTAINER_PORT:-5000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vector_net

  streamlit-ui:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    ports:
      - "${STREAMLIT_PORT:-8501}:${STREAMLIT_CONTAINER_PORT:-8501}"
    environment:
      - API_URL=http://video-retrieval-api:${API_CONTAINER_PORT:-5000}
      - STREAMLIT_SERVER_PORT=${STREAMLIT_CONTAINER_PORT:-8501}
    depends_on:
      - video-retrieval-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${STREAMLIT_CONTAINER_PORT:-8501}/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vector_net

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:${APP_CONTAINER_PORT:-80}"
    environment:
      - NGINX_PORT=${APP_CONTAINER_PORT:-80}
      - API_CONTAINER_PORT=${API_CONTAINER_PORT:-5000}
      - STREAMLIT_CONTAINER_PORT=${STREAMLIT_CONTAINER_PORT:-8501}
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streamlit-ui
      - video-retrieval-api
    networks:
      - vector_net

volumes:
  weaviate_data:

networks:
  vector_net:
    driver: bridge
